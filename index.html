<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalServices - Plateforme Universelle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Categories Grid */
        .categories-section {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .section-title {
            text-align: center;
            margin-bottom: 2rem;
            color: #1e3c72;
            font-size: 2.5rem;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .category-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .category-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .category-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .category-desc {
            color: #666;
            margin-bottom: 1rem;
        }

        .category-card:hover .category-desc {
            color: rgba(255,255,255,0.9);
        }

        /* Annonces Grid */
        .annonces-section {
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .annonces-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .annonce-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .annonce-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .annonce-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .annonce-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: bold;
        }

        .annonce-content {
            padding: 1.5rem;
        }

        .annonce-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .annonce-price {
            font-size: 1.5rem;
            color: #2a5298;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .annonce-location {
            color: #666;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .annonce-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .btn-details {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2a5298;
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .categories-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>GlobalServices</h1>
                <p>La plateforme universelle de services</p>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" onclick="openModal('login')">Connexion</button>
                <button class="btn btn-primary" onclick="openModal('register')">Inscription</button>
                <button class="btn btn-secondary" onclick="openModal('post')">Publier une annonce</button>
            </div>
        </div>
    </header>

    <main>
        <section class="categories-section">
            <h2 class="section-title">Nos Services</h2>
            <div class="categories-grid" id="categoriesGrid"></div>
        </section>

        <section class="annonces-section">
            <h2 class="section-title">Annonces Récentes</h2>
            <div class="annonces-grid" id="annoncesGrid"></div>
        </section>
    </main>

    <!-- Modals -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('login')">&times;</span>
            <h2>Connexion</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Se connecter</button>
            </form>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('register')">&times;</span>
            <h2>Inscription</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="registerName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="registerPhone" required>
                </div>
                <div class="form-group">
                    <label>Pays</label>
                    <select id="registerCountry" required>
                        <option value="">Sélectionnez un pays</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">S'inscrire</button>
            </form>
        </div>
    </div>

    <div class="modal" id="postModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('post')">&times;</span>
            <h2>Publier une annonce</h2>
            <form id="postForm" onsubmit="handlePost(event)">
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="postCategory" required>
                        <option value="">Sélectionnez une catégorie</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="postTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="postDescription" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Prix (en €)</label>
                    <input type="number" id="postPrice" required>
                </div>
                <div class="form-group">
                    <label>Localisation</label>
                    <input type="text" id="postLocation" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="postImage" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Publier</button>
            </form>
        </div>
    </div>

    <script>
        // Configuration API
        const API_URL = 'http://localhost:5000/api';

        // États
        let currentUser = null;
        let categories = [];
        let annonces = [];

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadAnnonces();
            loadCountries();
            checkAuthStatus();
        });

        // Charger les catégories
        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                categories = await response.json();
                displayCategories();
                populateCategorySelect();
            } catch (error) {
                console.error('Erreur chargement catégories:', error);
            }
        }

        // Afficher les catégories
        function displayCategories() {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = categories.map(cat => `
                <div class="category-card" onclick="filterByCategory('${cat.id}')">
                    <div class="category-icon">${cat.icon}</div>
                    <h3 class="category-title">${cat.name}</h3>
                    <p class="category-desc">${cat.description}</p>
                    <small>${cat.count} annonces</small>
                </div>
            `).join('');
        }

        // Remplir le select des catégories
        function populateCategorySelect() {
            const select = document.getElementById('postCategory');
            select.innerHTML = '<option value="">Sélectionnez une catégorie</option>' +
                categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        }

        // Charger les annonces
        async function loadAnnonces() {
            try {
                const response = await fetch(`${API_URL}/annonces`);
                annonces = await response.json();
                displayAnnonces(annonces);
            } catch (error) {
                console.error('Erreur chargement annonces:', error);
            }
        }

        // Afficher les annonces
        function displayAnnonces(annoncesToShow) {
            const grid = document.getElementById('annoncesGrid');
            if (annoncesToShow.length === 0) {
                grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Aucune annonce trouvée</p>';
                return;
            }

            grid.innerHTML = annoncesToShow.map(annonce => `
                <div class="annonce-card">
                    <div class="annonce-image" style="background-image: url('${annonce.image}')">
                        <span class="annonce-badge">${annonce.category}</span>
                    </div>
                    <div class="annonce-content">
                        <h3 class="annonce-title">${annonce.title}</h3>
                        <div class="annonce-price">${annonce.price} €</div>
                        <div class="annonce-location">📍 ${annonce.location}</div>
                        <p>${annonce.description.substring(0, 100)}...</p>
                        <div class="annonce-footer">
                            <span>👤 ${annonce.publisher}</span>
                            <button class="btn-details" onclick="showDetails('${annonce.id}')">Voir détails</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Charger les pays
        async function loadCountries() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all');
                const countries = await response.json();
                const select = document.getElementById('registerCountry');
                select.innerHTML = '<option value="">Sélectionnez un pays</option>' +
                    countries.sort((a, b) => a.name.common.localeCompare(b.name.common))
                        .map(c => `<option value="${c.cca2}">${c.name.common}</option>`).join('');
            } catch (error) {
                console.error('Erreur chargement pays:', error);
            }
        }

        // Gestionnaires d'événements
        function openModal(type) {
            document.getElementById(`${type}Modal`).classList.add('active');
        }

        function closeModal(type) {
            document.getElementById(`${type}Modal`).classList.remove('active');
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    currentUser = data.user;
                    localStorage.setItem('token', data.token);
                    alert('Connexion réussie!');
                    closeModal('login');
                    checkAuthStatus();
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('Erreur de connexion');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const userData = {
                name: document.getElementById('registerName').value,
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value,
                phone: document.getElementById('registerPhone').value,
                country: document.getElementById('registerCountry').value
            };

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Inscription réussie! Vous pouvez maintenant vous connecter.');
                    closeModal('register');
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('Erreur d\'inscription');
            }
        }

        async function handlePost(event) {
            event.preventDefault();
            
            if (!currentUser) {
                alert('Veuillez vous connecter pour publier une annonce');
                openModal('login');
                return;
            }

            const annonceData = {
                category: document.getElementById('postCategory').value,
                title: document.getElementById('postTitle').value,
                description: document.getElementById('postDescription').value,
                price: document.getElementById('postPrice').value,
                location: document.getElementById('postLocation').value,
                image: document.getElementById('postImage').value,
                publisher: currentUser.name,
                publisherId: currentUser.id
            };

            try {
                const response = await fetch(`${API_URL}/annonces`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(annonceData)
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Annonce publiée avec succès!');
                    closeModal('post');
                    loadAnnonces(); // Recharger les annonces
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('Erreur lors de la publication');
            }
        }

        function filterByCategory(categoryId) {
            const filtered = annonces.filter(a => a.categoryId === categoryId);
            displayAnnonces(filtered);
        }

        function showDetails(annonceId) {
            const annonce = annonces.find(a => a.id === annonceId);
            if (annonce) {
                alert(`
                    Titre: ${annonce.title}
                    Prix: ${annonce.price} €
                    Localisation: ${annonce.location}
                    Description: ${annonce.description}
                    Publié par: ${annonce.publisher}
                `);
            }
        }

        function checkAuthStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                // Vérifier la validité du token
                fetch(`${API_URL}/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.valid) {
                        currentUser = data.user;
                    } else {
                        localStorage.removeItem('token');
                    }
                });
            }
        }
    </script>
</body>
</html>
